<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WiFi LAVA - Diseño y soluciones</title>
    <link rel="stylesheet" href="StyleSheet.css">
    <link rel="icon" href="Imagenes/LAVA.jpg">
</head>

<body>

    <main class="contenedor">
        <section id="Bienvenida">

            <img id="Logo" src="Imagenes/LAVA.jpg" alt="Logo de LAVA">

            <h1>🪚 LAVA - Diseño y Soluciones 📐</h1>

            <p>🪵 Bienvenido a WiFi LAVA 🪚</p>
            <p>Síguenos en nuestras redes sociales para acceder al WiFi.</p>

            <div class="Redes">

                <a class="red-social" id="Instagram"
                   href="https://www.instagram.com/lavadisenosoluciones/"
                   target="_blank"
                   rel="noopener noreferrer">
                    <img src="Imagenes/Instagram.png" alt="Seguir a LAVA en Instagram">
                </a>

                <a class="red-social" id="TikTok"
                   href="https://www.tiktok.com/@lavadisenosoluciones"
                   target="_blank"
                   rel="noopener noreferrer">
                    <img src="Imagenes/Tik Tok.png" alt="Seguir a LAVA en TikTok">
                </a>

                <a class="red-social" id="Youtube"
                   href="https://www.youtube.com/@lavadisenoysoluciones"
                   target="_blank"
                   rel="noopener noreferrer">
                    <img src="Imagenes/YouTube.png" alt="Seguir a LAVA en YouTube">
                </a>

                <a class="red-social" id="Facebook"
                   href="https://www.facebook.com/search/top?q=lava%20-%20dise%C3%B1o%20y%20soluciones"
                   target="_blank"
                   rel="noopener noreferrer">
                    <img src="Imagenes/Facebook.png" alt="Seguir a LAVA en Facebook">
                </a>

            </div>

            <p class="aviso">Después de visitar nuestras redes sociales, vuelve aquí para obtener tu acceso al WiFi.</p>
        </section>

        <section id="wifi">
            <h2>🎉 ¡Gracias por apoyarnos!</h2>
            <p>Ya puedes conectarte al WiFi.</p>

            <p>Contraseña: Makoto8805</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
